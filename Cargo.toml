[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/wollax/assay"

[workspace.dependencies]
assay-types = { path = "crates/assay-types" }
assay-core = { path = "crates/assay-core" }
assay-mcp = { path = "crates/assay-mcp" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
rmcp = { version = "0.17", features = ["server", "transport-io"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.28"
thiserror = "2"
color-eyre = "0.6"
