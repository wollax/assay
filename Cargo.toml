[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.3.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/wollax/assay"

[workspace.dependencies]
assay-types = { path = "crates/assay-types" }
assay-core = { path = "crates/assay-core" }
assay-mcp = { path = "crates/assay-mcp" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = { version = "1", features = ["chrono04"] }
rmcp = { version = "0.17", features = ["server", "transport-io"] }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.28"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
thiserror = "2"
color-eyre = "0.6"
inventory = "0.3"
insta = { version = "1.46", features = ["json"] }
jsonschema = "0.43"
libc = "0.2"
tempfile = "3"
anyhow = "1"
serial_test = "3"
dirs = "6"
regex-lite = "0.1"
notify = { version = "7", default-features = false, features = ["macos_kqueue"] }
tracing-appender = "0.2"
which = "7"

[workspace.lints.clippy]
derive_partial_eq_without_eq = "deny"
