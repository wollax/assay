# Example Smelt job manifest — Docker Compose runtime with a Postgres service.
#
# Demonstrates the "compose" runtime which spins up sidecar services
# alongside the agent container. Services are defined via [[services]]
# arrays and support arbitrary Docker Compose keys (environment, ports,
# volumes, healthcheck, etc.) through a passthrough mechanism.
#
# Run with: smelt run examples/job-manifest-compose.toml --dry-run
#
# Note: `job.repo` must be an absolute local path for real (non-dry-run) execution.
# The "." placeholder works for --dry-run but `smelt run` will resolve it
# to the current working directory at runtime.

# [job] — required. Identifies the job and which repo/ref to work against.
[job]
# Human-readable job name. Must be non-empty.
name = "compose-job"
# Repository URL or local path. Use "." for the current directory.
repo = "."
# Git ref (branch, tag, or commit SHA) to base work on.
base_ref = "main"

# [environment] — required. Container runtime and image configuration.
[environment]
# Container runtime. Set to "compose" to enable Docker Compose mode
# with sidecar services defined in [[services]] below.
runtime = "compose"
# Container image for the main agent container.
image = "alpine:3"

# [credentials] — required. LLM provider and model selection.
[credentials]
# LLM provider name (e.g. "anthropic", "openai").
provider = "anthropic"
# Model identifier for the coding agent.
model = "claude-sonnet-4-20250514"

# [credentials.env] — optional. Environment variable mappings for credential resolution.
[credentials.env]
api_key = "ANTHROPIC_API_KEY"

# [[services]] — optional (compose runtime only). Sidecar service definitions.
# Each entry defines a container that runs alongside the agent.
# Known fields: name, image. All other keys (environment, ports, volumes,
# healthcheck, etc.) are passed through to Docker Compose as-is.
[[services]]
# Unique service name within the compose network.
name = "postgres"
# Container image reference for this service.
image = "postgres:16-alpine"

# Arbitrary Compose keys are passed through via serde flatten.
# [services.environment] sets env vars inside the service container.
[services.environment]
POSTGRES_PASSWORD = "smelt"

# [services.healthcheck] — Docker Compose healthcheck configuration.
# Smelt waits for healthy services before starting agent sessions.
[services.healthcheck]
# Command to test service readiness.
test = ["CMD-SHELL", "pg_isready -U postgres"]
# Interval between health checks (Docker duration string).
interval = "5s"
# Number of consecutive failures before marking unhealthy.
retries = 5

# [[session]] — at least one required.
[[session]]
# Unique session name.
name = "db-check"
# Task specification / prompt for the agent.
spec = "Verify the database connection is available and run a simple query."
# Harness command for verification.
harness = "sh -c 'echo SELECT 1'"
# Maximum seconds before timeout. Must be > 0.
timeout = 300

# [merge] — required. Controls how session results are combined.
[merge]
# Merge strategy: "sequential" merges sessions one at a time in order.
strategy = "sequential"
# Target branch for the merged result.
target = "main"
# Whether to use AI-assisted conflict resolution. Default: false.
ai_resolution = false
