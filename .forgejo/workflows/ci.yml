name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: https://github.com/Swatinem/rust-cache@v2
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Install tools
        run: cargo binstall -y just cargo-deny cargo-nextest
      - run: just ready

  plugins:
    name: Validate plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Claude Code plugin.json
        run: python3 -c "import json; json.load(open('plugins/claude-code/.claude-plugin/plugin.json'))"
      - name: Validate OpenCode opencode.json
        run: python3 -c "import json; json.load(open('plugins/opencode/opencode.json'))"
      - name: Validate OpenCode package.json
        run: python3 -c "import json; json.load(open('plugins/opencode/package.json'))"
      - name: Validate OpenCode tsconfig.json
        run: python3 -c "import json; json.load(open('plugins/opencode/tsconfig.json'))"
