name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked
      # Run all tests except docker_lifecycle (requires Docker daemon + flaky teardown races)
      - run: cargo test --locked --workspace --exclude smelt-cli
      - run: cargo test --locked -p smelt-cli --lib --test dry_run
      - run: cargo clippy --locked -- -D warnings
      - run: cargo fmt --check

      - name: Alert — CI failed
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf \
            -H "Title: smelt CI failed" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Run: ${RUN_URL}" \
            https://ntfy.alexwollan.com/homelab-alerts \
            || echo "::warning::ntfy notification failed (non-fatal)"
