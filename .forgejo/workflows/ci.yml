name: CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'smelt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'justfile'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - '.forgejo/**'
      - 'plugins/**'
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'smelt/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - 'justfile'
      - 'rust-toolchain.toml'
      - '.cargo/**'
      - '.forgejo/**'
      - 'plugins/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  check-assay:
    name: Check assay (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (1.93.0) 2026-03-31
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-binstall
        run: |
          BASE=https://github.com/cargo-bins/cargo-binstall/releases/download/v1.17.9
          TARBALL=cargo-binstall-x86_64-unknown-linux-musl.tgz
          curl -L --proto '=https' --tlsv1.2 -sSf "${BASE}/${TARBALL}" -o /tmp/cargo-binstall.tgz
          curl -L --proto '=https' --tlsv1.2 -sSf "${BASE}/${TARBALL}.sig" -o /tmp/cargo-binstall.tgz.sig
          # Verify via minisign against the stable cargo-binstall signing key.
          # Public key: https://github.com/cargo-bins/cargo-binstall/blob/main/SIGNING_KEY
          # Key ID: A61FF3128D7A0977
          sudo apt-get install -y -q minisign
          echo 'untrusted comment: cargo-binstall signing key' > /tmp/binstall.pub
          echo 'RWR3CXqNEvMfpn3Z3B8EvM8nW6+Ej+ArxNTssUFX0BajRjSAovzpUYgY' >> /tmp/binstall.pub
          minisign -V -p /tmp/binstall.pub -x /tmp/cargo-binstall.tgz.sig -m /tmp/cargo-binstall.tgz
          tar -xz -C ~/.cargo/bin < /tmp/cargo-binstall.tgz
      - name: Install tools (just, cargo-deny, cargo-nextest)
        run: cargo binstall -y just@1.46.0 cargo-deny@0.19.0 cargo-nextest@0.9.132
      - name: Run just ready
        run: just ready

      - name: Alert — CI failed
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf \
            -H "Title: assay CI failed (check-assay)" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Run: ${RUN_URL}" \
            https://ntfy.alexwollan.com/homelab-alerts \
            || echo "::warning::ntfy notification failed (non-fatal)"

  check-smelt:
    name: Check smelt (stable)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install Rust toolchain
        uses: https://github.com/dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (1.93.0) 2026-03-31
        with:
          components: rustfmt, clippy
      - name: Cache Rust dependencies
        uses: https://github.com/Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-binstall
        run: |
          BASE=https://github.com/cargo-bins/cargo-binstall/releases/download/v1.17.9
          TARBALL=cargo-binstall-x86_64-unknown-linux-musl.tgz
          curl -L --proto '=https' --tlsv1.2 -sSf "${BASE}/${TARBALL}" -o /tmp/cargo-binstall.tgz
          curl -L --proto '=https' --tlsv1.2 -sSf "${BASE}/${TARBALL}.sig" -o /tmp/cargo-binstall.tgz.sig
          sudo apt-get install -y -q minisign
          echo 'untrusted comment: cargo-binstall signing key' > /tmp/binstall.pub
          echo 'RWR3CXqNEvMfpn3Z3B8EvM8nW6+Ej+ArxNTssUFX0BajRjSAovzpUYgY' >> /tmp/binstall.pub
          minisign -V -p /tmp/binstall.pub -x /tmp/cargo-binstall.tgz.sig -m /tmp/cargo-binstall.tgz
          tar -xz -C ~/.cargo/bin < /tmp/cargo-binstall.tgz
      - name: Install tools (just, cargo-nextest)
        run: cargo binstall -y just@1.46.0 cargo-nextest@0.9.132
      - name: Run smelt-targeted checks
        run: just fmt-check && just test-smelt && just lint-smelt

      - name: Alert — CI failed
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf \
            -H "Title: assay CI failed (check-smelt)" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Run: ${RUN_URL}" \
            https://ntfy.alexwollan.com/homelab-alerts \
            || echo "::warning::ntfy notification failed (non-fatal)"

  plugins:
    name: Validate plugins
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate plugin manifests
        run: |
          node -e "
            [
              'plugins/claude-code/.claude-plugin/plugin.json',
              'plugins/opencode/opencode.json',
              'plugins/opencode/package.json',
              'plugins/opencode/tsconfig.json',
            ].forEach(f => { JSON.parse(require('fs').readFileSync(f)); console.log('ok:', f); });
          "

      - name: Alert — plugins validation failed
        if: failure()
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf \
            -H "Title: assay plugins validation failed" \
            -H "Priority: high" \
            -H "Tags: x" \
            -d "Run: ${RUN_URL}" \
            https://ntfy.alexwollan.com/homelab-alerts \
            || echo "::warning::ntfy notification failed (non-fatal)"
