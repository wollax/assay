[profile.dev]
# Disabled to prevent Cargo's incremental compilation cache from consuming
# excessive disk space during the OTel/prost/tonic dependency additions in M009.
# Remove after M009 is merged if disk pressure is no longer a concern.
incremental = false

[profile.test]
# Disable incremental compilation for test builds to avoid stale-artifact
# flakiness seen during rapid iterative test runs.
incremental = false
