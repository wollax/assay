# Per-test timeout: warn at 60s, kill at 120s.
# Most tests complete in <5s; integration tests that spawn subprocesses
# typically finish in <30s. 120s leaves headroom for slow CI machines
# while preventing a single hung test from blocking the whole suite.
[profile.default.slow-timeout]
period = "60s"
terminate-after = 2

# docker_lifecycle tests must run serially: they share a Docker daemon and
# concurrent container provision/teardown causes 409 races. One thread ensures
# each test gets exclusive access to the daemon for its full lifecycle.
[[profile.default.overrides]]
filter = 'binary(docker_lifecycle)'
test-threads = 1

# Tighter limits for CI: warn at 30s, kill at 60s.
[profile.ci.slow-timeout]
period = "30s"
terminate-after = 2

# Same serial constraint for CI profile.
[[profile.ci.overrides]]
filter = 'binary(docker_lifecycle)'
test-threads = 1
