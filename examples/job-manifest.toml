# Example Smelt job manifest — full schema demonstration.
#
# Run with: smelt run examples/job-manifest.toml --dry-run
#
# Note: `job.repo` must be an absolute local path when running `smelt run`.
# The "." placeholder works for --dry-run but `smelt run` will resolve it
# to the current working directory at runtime.

[job]
name = "add-user-auth"
repo = "."
base_ref = "main"

[environment]
runtime = "docker"
image = "alpine:3"

[environment.resources]
cpu = "2"
memory = "4G"

[credentials]
provider = "anthropic"
model = "claude-sonnet-4-20250514"

[credentials.env]
api_key = "ANTHROPIC_API_KEY"

[[session]]
name = "frontend"
spec = "Implement the login page with email/password form, validation, and error states."
harness = "npm test -- --filter auth"
timeout = 300

[[session]]
name = "backend"
spec = "Implement the /api/auth/login endpoint with JWT tokens and rate limiting."
harness = "npm test -- --filter api-auth"
timeout = 600

[[session]]
name = "integration"
spec = "Add end-to-end tests for the login flow using Playwright."
harness = "npx playwright test auth.spec.ts"
timeout = 900
depends_on = ["frontend", "backend"]

[merge]
strategy = "sequential"
order = ["frontend", "backend", "integration"]
ai_resolution = true
target = "main"
