# Example Smelt job manifest — full schema demonstration.
#
# Shows every section and field available in a standard Docker-based job.
# This is the most complete reference for the manifest format.
#
# Run with: smelt run examples/job-manifest.toml --dry-run
#
# Note: `job.repo` must be an absolute local path when running `smelt run`.
# The "." placeholder works for --dry-run but `smelt run` will resolve it
# to the current working directory at runtime.

# [job] — required. Identifies the job and which repo/ref to work against.
[job]
# Human-readable job name. Must be non-empty.
name = "add-user-auth"
# Repository URL or local path. Use "." for the current directory.
# For real (non-dry-run) execution this must be a valid repo path or URL.
repo = "."
# Git ref (branch, tag, or commit SHA) to base work on.
base_ref = "main"

# [environment] — required. Container runtime and image configuration.
[environment]
# Container runtime to use. Values: "docker" (default), "compose", "kubernetes".
runtime = "docker"
# Container image reference (e.g. "alpine:3", "ubuntu:22.04").
image = "alpine:3"

# [environment.resources] — optional. Resource limits passed to the container runtime.
# Keys and values are runtime-specific strings (e.g. Docker --cpus, --memory).
[environment.resources]
# Number of CPU cores available to the container.
cpu = "2"
# Memory limit for the container (e.g. "4G", "512M").
memory = "4G"

# [credentials] — required. LLM provider and model selection.
[credentials]
# LLM provider name (e.g. "anthropic", "openai").
provider = "anthropic"
# Model identifier for the coding agent.
model = "claude-sonnet-4-20250514"

# [credentials.env] — optional. Environment variable mappings for credential resolution.
# Key = logical name used by the provider, Value = env var name to read from host.
[credentials.env]
api_key = "ANTHROPIC_API_KEY"

# [[session]] — at least one required. Each defines an independent coding task.
[[session]]
# Unique name for this session. Used in depends_on and merge order references.
name = "frontend"
# Task specification / prompt describing what the agent should do.
spec = "Implement the login page with email/password form, validation, and error states."
# Command to run for verification after the agent finishes.
harness = "npm test -- --filter auth"
# Maximum seconds before this session times out. Must be > 0.
timeout = 300

[[session]]
name = "backend"
spec = "Implement the /api/auth/login endpoint with JWT tokens and rate limiting."
harness = "npm test -- --filter api-auth"
timeout = 600

[[session]]
name = "integration"
spec = "Add end-to-end tests for the login flow using Playwright."
harness = "npx playwright test auth.spec.ts"
timeout = 900
# depends_on — optional. List of session names that must complete before this one starts.
# Creates an execution dependency graph. Referenced sessions must exist.
depends_on = ["frontend", "backend"]

# [merge] — required. Controls how session results are combined.
[merge]
# Merge strategy: "sequential" merges sessions one at a time in order.
strategy = "sequential"
# Explicit merge order. If omitted, sessions are merged in definition order.
# All referenced session names must exist.
order = ["frontend", "backend", "integration"]
# Whether to use AI-assisted conflict resolution during merge.
# Default: false.
ai_resolution = true
# Target branch for the merged result.
target = "main"
