[advisories]
ignore = [
    # notify-types -> instant: unmaintained, no replacement available in notify 7.x
    "RUSTSEC-2024-0384",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Artistic-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "deny"
wildcards = "allow"

skip = [
    # ratatui 0.30 uses ratatui-crossterm which depends on crossterm 0.29;
    # assay-tui directly depends on crossterm 0.28 for terminal handling
    { crate = "crossterm@0.28", reason = "ratatui-crossterm uses 0.29; direct dep is 0.28" },

    # ahash (via jsonschema) pulls in getrandom 0.3; newer crates use 0.4
    { crate = "getrandom@0.3", reason = "ahash in jsonschema uses getrandom 0.3; rest of tree uses 0.4" },

    # dirs-sys -> redox_users -> getrandom 0.2; rest of tree uses 0.4
    { crate = "getrandom@0.2", reason = "redox_users (via dirs-sys) uses getrandom 0.2" },

    # crossterm 0.28 -> polling 3.x -> rustix 0.38 -> linux-raw-sys 0.4
    { crate = "linux-raw-sys@0.4", reason = "rustix 0.38 (via crossterm 0.28/polling) needs linux-raw-sys 0.4" },

    # crossterm 0.28 -> polling 3.x -> rustix 0.38; newer crates use rustix 1.x
    { crate = "rustix@0.38", reason = "crossterm 0.28 transitively requires rustix 0.38 via polling" },

    # notify -> inotify -> bitflags 1.x; rest of tree uses bitflags 2.x
    { crate = "bitflags@1", reason = "inotify (via notify) uses bitflags 1.x" },
]

skip-tree = [
    # Windows platform crates have version fragmentation across the ecosystem;
    # windows-sys 0.59/0.60/0.61 and their windows-targets/windows_* sub-crates
    # are all pulled in by different transitive dependencies
    { crate = "windows-sys@0.52", reason = "notify uses windows-sys 0.52; rest of tree uses newer versions" },
    { crate = "windows-sys@0.59", reason = "Windows platform crate version fragmentation across transitive deps" },
    { crate = "windows-sys@0.60", reason = "Windows platform crate version fragmentation across transitive deps" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
